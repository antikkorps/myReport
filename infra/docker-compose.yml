# Local development stack: Postgres 16, Redis 7, MinIO (S3-compatible).
# Use via `pnpm dev:up` / `pnpm dev:down` from the repo root.
name: myreport

services:
  postgres:
    image: postgres:16-alpine
    container_name: myreport-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: myreport
      POSTGRES_PASSWORD: myreport
      POSTGRES_DB: myreport
    ports:
      - "5433:5432"   # Host 5433 to avoid clashing with a local Postgres on 5432.
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myreport -d myreport"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: myreport-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: myreport-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: create the bucket on startup so the API can use it right away.
  minio-init:
    image: minio/mc:latest
    container_name: myreport-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/myreport &&
        mc anonymous set download local/myreport &&
        echo "bucket ready"
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  minio-data:
